<!DOCTYPE html>
<html>
<head>
  <base href = "/watts-up/">
  <meta charset = "UTF-8">
  <meta content = "IE=Edge" http-equiv = "X-UA-Compatible">
  <meta name = "description" content = "Watts Up">
  <meta name = "apple-mobile-web-app-capable" content = "yes">
  <meta name = "apple-mobile-web-app-status-bar-style" content = "black">
  <meta name = "apple-mobile-web-app-title" content = "Watts Up">
  <link rel = "apple-touch-icon" href = "assets/assets/img/logo.png">
  <link rel = "icon" type = "image/png" href = "assets/assets/img/logo.png"/>
  <title>Watts Up</title>
  <link rel = "manifest" href = "manifest.json">

  <style>
    body {
      background-color: #f8fafc;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .loader-container {
      text-align: center;
    }
    .logo-icon {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
      animation: pulse 2s infinite;
    }
    .logo-icon svg {
      width: 32px;
      height: 32px;
      fill: white;
    }
    h2 { color: #0f172a; margin-bottom: 6px; font-weight: 800; letter-spacing: -0.5px; }
    p { color: #64748b; font-size: 14px; }
    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(245, 158, 11, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
    }
  </style>
</head>
<body>
  <div class = "loader-container">
    <div class = "logo-icon">
      <svg viewBox = "0 0 24 24"><path d = "M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <h2>Watts Up</h2>
    <p>Initializing Grid...</p>
  </div>
  
  <script src = "flutter_bootstrap.js" async></script>
</body>
</html>
